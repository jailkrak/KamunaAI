services:
  - type: web
    name: forex-ai-api
    runtime: python
    repo: https://github.com/jailkrak/KamunaAI.git
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT